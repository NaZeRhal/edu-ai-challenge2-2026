    /* =====================================================
       CSS VARIABLES — new-spec.md §2
       ===================================================== */
    :root {
      /* Surfaces */
      --color-bg-page:                #f8fafc;
      --color-bg-surface:             #fff;
      --color-bg-surface-muted:       #f1f5f9;
      --color-border:                 #e2e8f0;

      /* Text */
      --color-text-primary:           #0f172a;
      --color-text-strong:            #1e293b;
      --color-text-secondary:         #475569;
      --color-text-muted:             #64748b;
      --color-text-faint:             #94a3b8;

      /* Accent */
      --color-accent:                 #0ea5e9;
      --color-accent-deep:            #0284c7;
      --color-accent-soft-bg:         #e0f2fe;

      /* Rank 1 — gold */
      --color-rank1-avatar-bg:        #86efac;
      --color-rank1-avatar-border:    #fbbf24;
      --color-rank1-avatar-text:      #166534;
      --color-rank1-badge-bg:         #eab308;
      --color-rank1-score-bg:         #fef9c3;
      --color-rank1-score-border:     #fde047;
      --color-rank1-score-text:       #ca8a04;
      --color-rank1-block-from:       #fef3c7;
      --color-rank1-block-to:         #fde68a;
      --color-rank1-block-top:        #fde047;
      --color-rank1-number-text:      rgba(234, 179, 8, .2);

      /* Rank 2 — silver */
      --color-rank2-avatar-bg:        #cbd5e1;
      --color-rank2-avatar-text:      #1e293b;
      --color-rank2-badge-bg:         #94a3b8;

      /* Rank 3 — bronze/teal */
      --color-rank3-avatar-bg:        #5eead4;
      --color-rank3-avatar-text:      #134e4a;
      --color-rank3-badge-bg:         #92400e;

      /* Default podium block */
      --color-block-from:             #e2e8f0;
      --color-block-to:               #cbd5e1;
      --color-block-top:              #cbd5e1;
      --color-rank-number-text:       rgba(148, 163, 184, .2);

      /* Row avatar default */
      --color-row-avatar-bg:          #fbbf24;

      /* Category badges */
      --color-cat-training-bg:        #dbeafe;
      --color-cat-training-text:      #1e40af;
      --color-cat-contribution-bg:    #f3e8ff;
      --color-cat-contribution-text:  #6b21a8;
      --color-cat-community-bg:       #dcfce7;
      --color-cat-community-text:     #166534;
      --color-cat-default-bg:         #e2e8f0;
      --color-cat-default-text:       #475569;

      /* Shadows */
      --shadow-rgba-5:                rgba(0, 0, 0, .05);
      --shadow-rgba-6:                rgba(0, 0, 0, .06);
      --shadow-rgba-10:               rgba(0, 0, 0, .1);
      --shadow-rgba-15:               rgba(0, 0, 0, .15);

      /* Spacing */
      --space-1: 4px;
      --space-2: 6px;
      --space-3: 8px;
      --space-4: 12px;
      --space-5: 16px;
      --space-6: 20px;
      --space-7: 24px;
      --space-8: 32px;
      --space-9: 64px;

      --pad-row:                  20px 24px;
      --pad-filter-bar:           20px 24px;
      --pad-podium:               32px 8px;
      --pad-podium-score-default: 6px 16px;
      --pad-podium-score-rank1:   8px 20px;
      --pad-cat-badge:            4px 12px;
      --pad-th:                   12px 8px;
      --pad-td:                   16px 8px;

      /* Container widths */
      --width-content-max:      1200px;
      --width-podium-max:       900px;
      --width-podium-col-max:   280px;
      --width-search-min:       250px;
      --width-rank-min:         32px;
      --size-row-avatar:        56px;

      /* Podium block heights */
      --height-block-rank1:        160px;
      --height-block-rank2:        128px;
      --height-block-rank3:        96px;
      --height-block-rank1-mobile: 140px;
      --height-block-rank2-mobile: 96px;
      --height-block-rank3-mobile: 64px;

      /* Offsets */
      --offset-rank1-margin-top:   -32px;
      --offset-rank3-number-top:   -16px;
      --offset-badge-bottom:       -8px;
      --offset-badge-right:        -4px;
      --podium-blocktop-height:    2px;

      /* Typography */
      --font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, Oxygen,
                     Ubuntu, Cantarell, "Fira Sans", "Droid Sans", "Helvetica Neue",
                     sans-serif;

      --fs-10:  10px;
      --fs-12:  12px;
      --fs-14:  14px;
      --fs-16:  16px;
      --fs-18:  18px;
      --fs-20:  20px;
      --fs-24:  24px;
      --fs-28:  28px;
      --fs-30:  30px;
      --fs-32:  32px;
      --fs-96:  96px;
      --fs-112: 112px;

      --fw-medium:   500;
      --fw-semibold: 600;
      --fw-bold:     700;
      --fw-black:    900;

      --tracking-wide: .05em;

      /* Border radius */
      --radius-pill:        20px;
      --radius-card:        12px;
      --radius-block-top:   12px 12px 0 0;
      --radius-circle:      50%;

      /* Box shadows */
      --shadow-xs:        0 1px 2px rgba(0, 0, 0, .05);
      --shadow-sm:        0 1px 3px rgba(0, 0, 0, .1);
      --shadow-md-soft:   0 4px 12px rgba(0, 0, 0, .05);
      --shadow-md:        0 4px 12px rgba(0, 0, 0, .1);
      --shadow-md-strong: 0 4px 12px rgba(0, 0, 0, .15);
      --shadow-inset:     inset 0 2px 4px rgba(0, 0, 0, .06);

      /* Transitions */
      --transition-theme:    background-color .3s, color .3s;
      --transition-quick:    all .2s;
      --transition-bg:       background .2s;
      --transition-bg-color: background-color .2s;

      /* Gradients */
      --gradient-block-default: linear-gradient(180deg, #e2e8f0, #cbd5e1);
      --gradient-block-rank1:   linear-gradient(180deg, #fef3c7, #fde68a);
    }

    /* =====================================================

       ===================================================== */
    *, *::before, *::after {
      box-sizing: border-box;
    }

      background: rgb(235, 235, 237);
      font-family: var(--font-family);
      margin: 0;

    /* ==========================================================

       ========================================================== */
    let filterYear     = 'All Years';
    let filterQuarter  = 'All Quarters';
    let filterCategory = 'All Categories';

    /* ==========================================================
       CATEGORY STAT ICON MAPPING
       lab  → Education icon
       reg  → Presentation icon
       uni  → University icon
       edu  → Mentoring icon
       ========================================================== */
    const STAT_MAP = {
      reg: { icon: 'Presentation', category: 'Public Speaking',        tooltip: 'Public Speaking' },
      uni: { icon: 'University',   category: 'University Partnership',  tooltip: 'University Partnership' },
      edu: { icon: 'Education',    category: 'Education',              tooltip: 'Education' }
    };

    /* Activity category → badge class */
    const BADGE_MAP = {
      'Education':              'categoryTraining_2943a085',
      'University Partnership': 'categoryCommunity_2943a085',
      'Public Speaking':        'categoryDefault_2943a085'
    };

    /* ==========================================================
       DROPDOWN INITIALISATION
       ========================================================== */
    function buildDropdown(containerId, dropdownId, optionId, options, onSelect) {
      const container  = document.getElementById(containerId);
      const dropdown   = document.getElementById(dropdownId);
      const optionSpan = document.getElementById(optionId);
      const listbox    = container.querySelector('.ms-Dropdown-items-wrapper');

      /* Inject ChevronDown SVG into caret */
      const caret = dropdown.querySelector('[data-icon-name="ChevronDown"]');
      if (caret) caret.innerHTML = SVG.ChevronDown;

      /* Build option items */
      options.forEach((opt, idx) => {
        const item = document.createElement('div');
        const isDefault = idx === 0;
        // Default "All X" items get selected but not highlighted blue
        item.className = 'ms-Dropdown-item' + (isDefault ? ' selected is-default' : '');
        item.setAttribute('role', 'option');
        item.setAttribute('aria-selected', isDefault ? 'true' : 'false');
        item.textContent = opt;

        item.addEventListener('click', (e) => {
          e.stopPropagation();
          optionSpan.textContent = opt;
          listbox.querySelectorAll('.ms-Dropdown-item').forEach(el => {
            el.classList.remove('selected', 'is-default');
            el.setAttribute('aria-selected', 'false');
          });
          item.classList.add('selected');
          // Re-add is-default if clicking the "All X" option
          if (isDefault) item.classList.add('is-default');
          item.setAttribute('aria-selected', 'true');
          closeAllDropdowns();
          onSelect(opt);
          render();
        });

        listbox.appendChild(item);
      });

      /* Toggle open/close */
      dropdown.addEventListener('click', (e) => {
        e.stopPropagation();
        const isOpen = container.classList.contains('open');
        closeAllDropdowns();
        if (!isOpen) {
          container.classList.add('open');
          dropdown.setAttribute('aria-expanded', 'true');
        }
      });

      /* Keyboard support */
      dropdown.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          dropdown.click();
        } else if (e.key === 'Escape') {
          closeAllDropdowns();
        }
      });
    }

    function closeAllDropdowns() {
      document.querySelectorAll('.ms-Dropdown-container').forEach(c => {
        c.classList.remove('open');
        const dd = c.querySelector('.ms-Dropdown');
        if (dd) dd.setAttribute('aria-expanded', 'false');
      });
    }

    /* Close dropdowns when clicking outside */
    document.addEventListener('click', closeAllDropdowns);

    function initDropdowns() {
      const years      = [...new Set(LEADERBOARD_DATA.map(e => e.year))].sort((a, b) => a - b);
      const quarters   = ['Q1', 'Q2', 'Q3', 'Q4'];
      const categories = [...new Set(
        LEADERBOARD_DATA.flatMap(e => e.activities.map(a => a.category))
      )].sort();

      buildDropdown(
        'dropdown-container-0', 'Dropdown0', 'Dropdown0-option',
        ['All Years', ...years.map(String)],
        (val) => { filterYear = val; }
      );

      buildDropdown(
        'dropdown-container-1', 'Dropdown1', 'Dropdown1-option',
        ['All Quarters', ...quarters],
        (val) => { filterQuarter = val; }
      );

      buildDropdown(
        'dropdown-container-2', 'Dropdown2', 'Dropdown2-option',
        ['All Categories', ...categories],
        (val) => { filterCategory = val; }
      );
    }

    /* ==========================================================
       SEARCH
       ========================================================== */
    document.querySelector('[data-icon-name="Search"]').innerHTML = SVG.Search;

    document.getElementById('SearchBox3').addEventListener('input', (e) => {
      filterSearch = e.target.value.trim();
      render();
    });

    /* ==========================================================
       FILTERING
       ========================================================== */
    function isFiltered() {
      return filterYear !== 'All Years'
          || filterQuarter !== 'All Quarters'
          || filterCategory !== 'All Categories'
          || filterSearch !== '';
    }

    function getFilteredEntries() {
      return LEADERBOARD_DATA.filter(entry => {
        if (filterYear !== 'All Years' && entry.year !== parseInt(filterYear, 10)) return false;
        if (filterQuarter !== 'All Quarters' && entry.quarter !== filterQuarter) return false;
        if (filterCategory !== 'All Categories' &&
            !entry.activities.some(a => a.category === filterCategory)) return false;
        if (filterSearch &&
            !entry.name.toLowerCase().includes(filterSearch.toLowerCase())) return false;
        return true;
      });
    }

    /* ==========================================================
       PODIUM RENDERER
       ========================================================== */
    function renderPodium(entries) {
      const podium = document.getElementById('podium');

      if (isFiltered() || entries.length < 3) {
        podium.classList.add('hidden');
        return;
      }
      podium.classList.remove('hidden');

      const top3 = entries.slice(0, 3);
      const rankClass = {
        1: 'podiumRank1_2943a085',
        2: 'podiumRank2_2943a085',
        3: 'podiumRank3_2943a085'
      };

      /* DOM order: rank2, rank1, rank3 — CSS order handles visual position */
      const domOrder = [top3[1], top3[0], top3[2]];

      podium.innerHTML = domOrder.map(entry => `
        <div class="podiumColumn_2943a085 ${rankClass[entry.rank]}">
          <div class="podiumUser_2943a085">
            <div class="podiumAvatarContainer_2943a085">
              <div class="podiumAvatar_2943a085" style="background-color:${entry.avatarColor};background-image:url('${entry.avatarUrl}');background-size:cover;background-position:center">
                <img src="${entry.avatarUrl}" style="display:none" onerror="var p=this.parentElement;p.style.backgroundImage='none';p.querySelector('span').style.display='';" alt="">
                <span style="display:none">${entry.avatarInitials}</span>
              </div>
              <div class="podiumRankBadge_2943a085">${entry.rank}</div>
            </div>
            <h3 class="podiumName_2943a085">${entry.name}</h3>
            <p class="podiumRole_2943a085">${entry.department}</p>
            <div class="podiumScore_2943a085">
              <i class="root-275" data-icon-name="FavoriteStarFill" aria-hidden="true">${SVG.FavoriteStarFill}</i>
              <span>${entry.score}</span>
            </div>
          </div>
          <div class="podiumBlock_2943a085">
            <div class="podiumBlockTop_2943a085"></div>
            <span class="podiumRankNumber_2943a085">${entry.rank}</span>
          </div>
        </div>
      `).join('');
    }

    /* ==========================================================
       LIST RENDERER
       ========================================================== */
    let tooltipCounter = 4;

    function renderList(entries) {
      const list = document.getElementById('list');

      list.innerHTML = entries.map(entry => {
        /* Category stats — only show categories with count > 0 */
        const statsHTML = ['reg', 'uni', 'edu']
          .map(key => {
            const { icon, category, tooltip } = STAT_MAP[key];
            const count = entry.activities.filter(a => a.category === category).length;
            return { key, icon, tooltip, count };
          })
          .filter(({ count }) => count > 0)
          .map(({ icon, tooltip, count }) => {
            const tid = tooltipCounter++;
            return `
              <div class="ms-TooltipHost root-276" role="none" data-tooltip="${tooltip}">
                <div class="categoryStat_2943a085">
                  <i class="categoryStatIcon_2943a085 root-275" data-icon-name="${icon}" aria-hidden="true">${SVG[icon]}</i>
                  <span class="categoryStatCount_2943a085">${count}</span>
                </div>
              </div>`;
          }).join('');

        /* Activity rows for the expanded details panel */
        const activitiesHTML = entry.activities.map(act => {
          const badgeClass = BADGE_MAP[act.category] || 'categoryDefault_2943a085';
          return `
            <tr>
              <td class="activityName_2943a085">${act.name}</td>
              <td><span class="categoryBadge_2943a085 ${badgeClass}">${act.category}</span></td>
              <td class="activityDate_2943a085">${act.date}</td>
              <td class="activityPoints_2943a085">+${act.points}</td>
            </tr>`;
        }).join('');

        return `
          <div class="userRowContainer_2943a085" data-id="${entry.id}">
            <div class="row_2943a085">
              <div class="rowMain_2943a085">
                <div class="rowLeft_2943a085">
                  <span class="rank_2943a085">${entry.rank}</span>
                  <div class="avatar_2943a085" style="background-color:${entry.avatarColor};background-image:url('${entry.avatarUrl}');background-size:cover;background-position:center">
                    <img src="${entry.avatarUrl}" style="display:none" onerror="var p=this.parentElement;p.style.backgroundImage='none';p.querySelector('span').style.display='';" alt="">
                    <span style="display:none">${entry.avatarInitials}</span>
                  </div>
                  <div class="info_2943a085">
                    <h3 class="name_2943a085">${entry.name}</h3>
                    <span class="role_2943a085">${entry.department}</span>
                  </div>
                </div>
                <div class="rowRight_2943a085">
                  <div class="categoryStats_2943a085">
                    ${statsHTML}
                  </div>
                  <div class="totalSection_2943a085">
                    <span class="totalLabel_2943a085">TOTAL</span>
                    <div class="score_2943a085">
                      <i class="root-275" data-icon-name="FavoriteStarFill" aria-hidden="true">${SVG.FavoriteStarFill}</i>
                      <span>${entry.score}</span>
                    </div>
                  </div>
                  <button class="expandButton_2943a085" aria-label="Expand" aria-expanded="false">
                    <i class="root-275" data-icon-name="ChevronDown" aria-hidden="true">${SVG.ChevronDown}</i>
                  </button>
                </div>
              </div>
            </div>
            <div class="details_2943a085">
              <h3 class="detailsTitle_2943a085">RECENT ACTIVITY</h3>
              <div class="tableWrapper_2943a085">
                <table class="activityTable_2943a085">
                  <thead>
                    <tr>
                      <th>ACTIVITY</th>
                      <th>CATEGORY</th>
                      <th>DATE</th>
                      <th>POINTS</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${activitiesHTML}
                  </tbody>
                </table>
              </div>
            </div>
          </div>`;
      }).join('');

      /* Attach expand / collapse handlers */
      list.querySelectorAll('.expandButton_2943a085').forEach(btn => {
        btn.addEventListener('click', () => {
          const container = btn.closest('.userRowContainer_2943a085');
          const expanded  = container.classList.toggle('expanded_2943a085');
          btn.setAttribute('aria-expanded', expanded ? 'true' : 'false');
        });
      });
    }

    /* ==========================================================
       MAIN RENDER
       ========================================================== */
    function render() {
      tooltipCounter = 4;
      const filtered = getFilteredEntries();
      renderPodium(filtered);
      renderList(filtered);
    }

    /* ==========================================================
       GLOBAL TOOLTIP
       ========================================================== */
    (function () {
      const tip = document.getElementById('global-tooltip');
      const GAP = 9;

      document.addEventListener('mouseover', function (e) {
        const host = e.target.closest('.ms-TooltipHost[data-tooltip]');
        if (!host) return;
        tip.textContent = host.dataset.tooltip;
        tip.style.display = 'block';
        const r = host.getBoundingClientRect();
        tip.style.left = (r.left + r.width / 2) + 'px';
        tip.style.top  = (r.top - tip.offsetHeight - GAP) + 'px';
      });

      document.addEventListener('mouseout', function (e) {
        const host = e.target.closest('.ms-TooltipHost[data-tooltip]');
        if (!host) return;
        if (!host.contains(e.relatedTarget)) tip.style.display = 'none';
      });
    }());

    /* ==========================================================
       BOOTSTRAP
       ========================================================== */
    initDropdowns();
    render();
  </script>
