<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Leader Board 2025</title>
  <style>
    /* ─── Design Tokens ────────────────────────────────────────────── */
    :root {
      --color-text-primary:       rgb(15, 23, 42);
      --color-text-muted:         rgb(100, 116, 139);
      --color-text-dim:           rgb(148, 163, 184);
      --color-text-stat:          rgb(71, 85, 105);
      --color-surface-card:       rgb(255, 255, 255);
      --color-surface-soft:       rgb(241, 245, 249);
      --color-surface-fluent:     rgb(235, 235, 237);
      --color-border:             rgb(226, 232, 240);
      --color-fluent-border:      rgb(55, 55, 55);
      --color-accent:             rgb(14, 165, 233);

      --color-rank1-avatar-border: rgb(251, 191, 36);
      --color-rank1-badge:        rgb(234, 179, 8);
      --color-rank1-pill-bg:      rgb(254, 249, 195);
      --color-rank1-pill-text:    rgb(202, 138, 4);
      --color-rank1-pill-border:  rgb(253, 224, 71);
      --color-rank1-pedestal-1:   rgb(254, 243, 199);
      --color-rank1-pedestal-2:   rgb(253, 230, 138);

      --color-rank2-badge:        rgb(148, 163, 184);
      --color-rank3-badge:        rgb(146, 64, 14);
      --color-podium-neutral-1:   rgb(226, 232, 240);
      --color-podium-neutral-2:   rgb(203, 213, 225);
      --color-rank-number-faded:  rgba(148, 163, 184, 0.2);
      --color-rank1-number-faded: rgba(234, 179, 8, 0.2);
      --color-feedback-bg:        rgba(202, 202, 211, 0.62);

      --font-app: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, Oxygen,
                  Ubuntu, Cantarell, "Fira Sans", "Droid Sans", "Helvetica Neue",
                  sans-serif;
      --font-fluent: "Segoe UI", "Segoe UI Web (West European)", "Segoe UI",
                     -apple-system, BlinkMacSystemFont, Roboto, "Helvetica Neue",
                     sans-serif;

      --shadow-card:            rgba(0, 0, 0, 0.1) 0px 1px 3px 0px;
      --shadow-pill:            rgba(0, 0, 0, 0.05) 0px 1px 2px 0px;
      --shadow-avatar:          rgba(0, 0, 0, 0.15) 0px 4px 12px 0px;
      --shadow-pedestal-inset:  rgba(0, 0, 0, 0.06) 0px 2px 4px 0px inset;
    }

    /* ─── Reset ────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-app);
      color: var(--color-text-primary);
      background: rgb(243, 244, 246);
      padding: 20px 0 80px;
    }

    /* ─── Page wrapper ─────────────────────────────────────────────── */
    .page-wrapper {
      max-width: 920px;
      margin: 0 auto;
      padding: 0 28px;
    }

    /* ─── Breadcrumb ───────────────────────────────────────────────── */
    .breadcrumb {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      list-style: none;
      height: 40px;
      margin-bottom: 4px;
    }
    .breadcrumb-item {
      display: flex;
      align-items: center;
      height: 40px;
    }
    .breadcrumb-link {
      padding: 0 4px;
      border: 0.8px solid rgba(0, 0, 0, 0);
      border-radius: 2px;
      font-size: 14px;
      font-weight: 600;
      line-height: 19.6px;
      text-decoration: underline;
      cursor: pointer;
      color: rgb(0, 0, 0);
      font-family: var(--font-app);
      background: none;
    }
    .breadcrumb-link:hover { text-decoration: underline; }
    .breadcrumb-link-current {
      text-decoration: none;
      cursor: default;
    }
    .breadcrumb-sep {
      font-size: 12px;
      color: var(--color-text-muted);
      padding: 0 2px;
      line-height: 1;
    }

    /* ─── Page H1 ──────────────────────────────────────────────────── */
    .page-h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--color-text-primary);
      font-family: var(--font-app);
      margin-bottom: 20px;
      line-height: 1.2;
    }

    /* ─── Leaderboard Card ─────────────────────────────────────────── */
    .leaderboard-card {
      background: var(--color-surface-card);
      border: 0.8px solid var(--color-border);
      border-radius: 12px;
      box-shadow: var(--shadow-card);
      overflow: visible;
    }

    /* ─── Header ───────────────────────────────────────────────────── */
    .lb-header {
      max-width: 1200px;
      margin: 0 0 32px 0;
      padding: 24px 24px 0;
    }
    .lb-title {
      font-size: 30px;
      font-weight: 700;
      color: var(--color-text-primary);
      font-family: var(--font-app);
      line-height: 1.2;
    }
    .lb-subtitle {
      font-size: 14px;
      font-weight: 400;
      color: var(--color-text-muted);
      margin-top: 6px;
    }

    /* ─── Filter Bar ───────────────────────────────────────────────── */
    .filter-bar {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 20px 24px;
      margin: 0 24px 24px;
      background: var(--color-surface-card);
      border: 0.8px solid var(--color-border);
      border-radius: 12px;
      box-shadow: var(--shadow-card);
      transition: 0.2s;
      max-width: 1200px;
    }
    .filters-group {
      display: flex;
      flex-direction: row;
      gap: 12px;
      align-items: center;
    }
    .dropdown-container {
      position: relative;
      display: inline-block;
    }
    .dropdown-select {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      height: 32px;
      padding: 0 28px 0 8px;
      background: var(--color-surface-fluent);
      border: 0.8px solid var(--color-fluent-border);
      border-radius: 2px;
      font-size: 14px;
      font-weight: 400;
      line-height: 30px;
      font-family: var(--font-app);
      color: var(--color-text-primary);
      cursor: pointer;
      overflow: hidden;
      outline: none;
    }
    .dropdown-select:focus {
      border-color: var(--color-accent);
    }
    .dropdown-caret {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--color-fluent-border);
      display: flex;
      align-items: center;
    }

    /* ─── Search ───────────────────────────────────────────────────── */
    .search-wrapper {
      flex: 1 1 0%;
      min-width: 250px;
      height: 32px;
    }
    .search-box {
      display: flex;
      align-items: stretch;
      height: 100%;
      padding: 1px 0 1px 4px;
      background: var(--color-surface-fluent);
      border: 0.8px solid var(--color-fluent-border);
      border-radius: 2px;
    }
    .search-box:focus-within {
      border-color: var(--color-accent);
    }
    .search-icon-container {
      width: 32px;
      height: 28.4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: width 0.167s;
    }
    .search-icon {
      transition: opacity 0.167s;
      color: rgb(41, 41, 43);
      display: flex;
    }
    .search-input {
      flex: 1 1 0px;
      font-size: 14px;
      font-weight: 400;
      font-family: var(--font-app);
      background: transparent;
      border: none;
      outline: none;
      padding: 0 0 0.5px 0;
      color: var(--color-text-primary);
    }
    .search-input::placeholder {
      color: var(--color-text-dim);
    }

    /* ─── Podium ───────────────────────────────────────────────────── */
    .podium {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: flex-end;
      gap: 24px;
      padding: 32px 8px;
      margin: 0 auto 64px;
      max-width: 900px;
    }
    .podium-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1 1 0%;
      max-width: 280px;
    }
    .podium-col-rank1 {
      margin-top: -32px;
    }
    .podium-user {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding-bottom: 12px;
    }
    .podium-avatar-container {
      position: relative;
      flex-shrink: 0;
      margin-bottom: 12px;
    }
    .podium-avatar {
      border-radius: 50%;
      box-shadow: var(--shadow-avatar);
      background-size: cover;
      background-position: 50% 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-app);
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      user-select: none;
    }
    .podium-avatar-r2, .podium-avatar-r3 {
      width: 80px;
      height: 80px;
      font-size: 20px;
      border: 4px solid rgb(255, 255, 255);
    }
    .podium-avatar-r1 {
      width: 112px;
      height: 112px;
      font-size: 28px;
      border: 4px solid var(--color-rank1-avatar-border);
    }
    .podium-rank-badge {
      position: absolute;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 4px solid rgb(255, 255, 255);
      border-radius: 50%;
      color: rgb(255, 255, 255);
      font-family: var(--font-app);
      font-weight: 700;
    }
    .podium-badge-r2, .podium-badge-r3 {
      width: 32px;
      height: 32px;
      font-size: 14px;
      top: 56px;
      left: 52px;
    }
    .podium-badge-r1 {
      width: 40px;
      height: 40px;
      font-size: 18px;
      top: 80px;
      left: 76px;
    }
    .podium-badge-r1 { background: var(--color-rank1-badge); }
    .podium-badge-r2 { background: var(--color-rank2-badge); }
    .podium-badge-r3 { background: var(--color-rank3-badge); }

    .podium-name {
      text-align: center;
      margin-bottom: 4px;
      font-family: var(--font-app);
      color: var(--color-text-primary);
    }
    .podium-name-r1 { font-size: 24px; font-weight: 700; }
    .podium-name-r2, .podium-name-r3 { font-size: 20px; font-weight: 700; }

    .podium-role {
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-muted);
      margin-bottom: 8px;
      text-align: left;
    }

    .podium-score-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      border-radius: 20px;
      box-shadow: var(--shadow-pill);
      font-family: var(--font-app);
      font-weight: 700;
    }
    .podium-score-pill-r1 {
      font-size: 20px;
      padding: 8px 20px;
      background: var(--color-rank1-pill-bg);
      color: var(--color-rank1-pill-text);
      border: 1px solid var(--color-rank1-pill-border);
    }
    .podium-score-pill-r2, .podium-score-pill-r3 {
      font-size: 18px;
      padding: 6px 16px;
      background: var(--color-surface-card);
      color: var(--color-accent);
      border: 1px solid var(--color-border);
    }

    /* Pedestal */
    .podium-block {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 16px;
      border-radius: 12px 12px 0 0;
      box-shadow: var(--shadow-pedestal-inset);
      overflow: hidden;
      width: 100%;
      position: relative;
    }
    .podium-block-r1 {
      height: 160px;
      background: linear-gradient(var(--color-rank1-pedestal-1), var(--color-rank1-pedestal-2));
      border-top: 1.6px solid rgb(253, 224, 71);
    }
    .podium-block-r2 {
      height: 128px;
      background: linear-gradient(var(--color-podium-neutral-1), var(--color-podium-neutral-2));
      border-top: 1.6px solid var(--color-podium-neutral-2);
    }
    .podium-block-r3 {
      height: 96px;
      background: linear-gradient(var(--color-podium-neutral-1), var(--color-podium-neutral-2));
      border-top: 1.6px solid var(--color-podium-neutral-2);
    }
    .podium-rank-number {
      font-family: var(--font-app);
      font-weight: 900;
      line-height: 1;
      user-select: none;
    }
    .podium-rank-number-r2, .podium-rank-number-r3 {
      font-size: 96px;
      color: var(--color-rank-number-faded);
    }
    .podium-rank-number-r1 {
      font-size: 112px;
      color: var(--color-rank1-number-faded);
    }
    .podium-rank-number-r3-offset {
      position: relative;
      top: -16px;
    }

    /* ─── List Section ─────────────────────────────────────────────── */
    .list-section {
      padding: 0 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .no-results {
      text-align: center;
      padding: 40px 0;
      font-size: 16px;
      color: var(--color-text-muted);
    }

    /* ─── User Row Card ────────────────────────────────────────────── */
    .user-row-container {
      background: var(--color-surface-card);
      border: 0.8px solid var(--color-border);
      border-radius: 12px;
      box-shadow: var(--shadow-card);
      overflow: hidden;
      transition: 0.2s;
      margin-bottom: 8px;
    }
    .user-row-container:last-child { margin-bottom: 0; }
    .user-row-container:hover {
      box-shadow: rgba(0, 0, 0, 0.12) 0px 4px 8px 0px;
    }

    .row-inner {
      padding: 20px 24px;
    }
    .row-main {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      min-height: 56px;
    }
    .row-left {
      display: flex;
      align-items: center;
      gap: 24px;
      flex: 1 1 0%;
    }
    .rank-cell {
      width: 32px;
      min-width: 32px;
      height: 32px;
      font-size: 24px;
      font-weight: 700;
      font-family: var(--font-app);
      color: var(--color-text-dim);
      text-align: center;
      line-height: 32px;
      flex-shrink: 0;
    }
    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background-color: var(--color-rank1-avatar-border);
      background-size: cover;
      background-position: 50% 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      font-family: var(--font-app);
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      user-select: none;
    }
    .info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1 1 0%;
      min-width: 0;
    }
    .name {
      font-size: 18px;
      font-weight: 700;
      color: var(--color-text-primary);
      font-family: var(--font-app);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .role {
      font-size: 14px;
      font-weight: 400;
      color: var(--color-text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-right {
      display: flex;
      align-items: center;
      gap: 24px;
      height: 48.8px;
      flex-shrink: 0;
    }

    /* Category stats — hidden when collapsed, shown when expanded */
    .category-stats {
      display: none;
      align-items: center;
      gap: 24px;
      height: 40px;
    }
    .user-row-container.expanded .row-right .category-stats {
      display: flex;
    }
    .category-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 20px;
      height: 40px;
    }
    .category-stat-icon {
      width: 20px;
      height: 20px;
      color: var(--color-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .category-stat-count {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-text-stat);
      line-height: 1;
    }

    .total-section {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      padding-left: 24px;
      border-left: 0.8px solid var(--color-border);
      min-width: 75px;
    }
    .total-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--color-text-dim);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .score {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 24px;
      font-weight: 700;
      font-family: var(--font-app);
      color: var(--color-accent);
    }

    .expand-btn {
      width: 36px;
      height: 36px;
      padding: 8px;
      border: none;
      border-radius: 50%;
      background: var(--color-surface-soft);
      color: var(--color-accent);
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .expand-btn:hover { background: var(--color-border); }
    .expand-btn svg {
      transition: transform 0.2s;
    }
    .user-row-container.expanded .expand-btn svg {
      transform: rotate(180deg);
    }

    /* ─── Expanded Panel ───────────────────────────────────────────── */
    .expanded-panel {
      display: none;
      padding: 0 24px 20px;
    }
    .user-row-container.expanded .expanded-panel {
      display: block;
    }
    .expanded-panel-inner {
      border-top: 0.8px solid var(--color-border);
      padding-top: 16px;
    }
    .expanded-stats-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--color-text-dim);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .expanded-stats-grid {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }
    .expanded-stat-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .expanded-stat-icon-wrap {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--color-surface-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-accent);
      flex-shrink: 0;
    }
    .expanded-stat-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .expanded-stat-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--color-text-dim);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .expanded-stat-value {
      font-size: 15px;
      font-weight: 700;
      color: var(--color-text-primary);
    }
    .expanded-stat-pts {
      font-size: 11px;
      font-weight: 400;
      color: var(--color-text-muted);
    }

    /* ─── Feedback Button ──────────────────────────────────────────── */
    .feedback-controller {
      position: fixed;
      z-index: 1000;
      right: 30px;
      bottom: 60px;
    }
    .feedback-button {
      width: 36px;
      height: 36px;
      background: var(--color-feedback-bg);
      border-radius: 5px;
      cursor: pointer;
      overflow: auto hidden;
      transition: bottom 0.4s ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .feedback-button:hover {
      background: rgba(202, 202, 211, 0.85);
    }
    .feedback-icon-container {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      width: 16px;
      height: 16px;
    }

    /* ─── Podium section hidden state (when filters active) ─────────── */
    .podium-hidden {
      display: none !important;
    }
  </style>
</head>
<body>

<div class="page-wrapper">

  <!-- 1. Breadcrumb -->
  <ul class="breadcrumb">
    <li class="breadcrumb-item">
      <a class="breadcrumb-link" href="#">Home</a>
      <span class="breadcrumb-sep">›</span>
    </li>
    <li class="breadcrumb-item">
      <a class="breadcrumb-link" href="#">EDU</a>
      <span class="breadcrumb-sep">›</span>
    </li>
    <li class="breadcrumb-item">
      <a class="breadcrumb-link breadcrumb-link-current" aria-current="page">Company Leader Board 2025</a>
    </li>
  </ul>

  <!-- 2. Page H1 -->
  <h1 class="page-h1">Company Leader Board 2025</h1>

  <!-- 3. White card -->
  <div class="leaderboard-card">

    <!-- a. Header -->
    <header class="lb-header">
      <div class="lb-header-content">
        <h2 class="lb-title">Leaderboard</h2>
        <p class="lb-subtitle">Top performers based on contributions and activity</p>
      </div>
    </header>

    <!-- b. Filter bar -->
    <div class="filter-bar">
      <div class="filters-group">

        <!-- Year filter (120px) -->
        <div class="dropdown-container">
          <select class="dropdown-select" id="yearFilter" style="width:120px" aria-label="Filter by year">
            <option value="all">All Years</option>
          </select>
          <span class="dropdown-caret">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </span>
        </div>

        <!-- Quarter filter (120px) -->
        <div class="dropdown-container">
          <select class="dropdown-select" id="quarterFilter" style="width:120px" aria-label="Filter by quarter">
            <option value="all">All Quarters</option>
            <option value="Q1">Q1</option>
            <option value="Q2">Q2</option>
            <option value="Q3">Q3</option>
            <option value="Q4">Q4</option>
          </select>
          <span class="dropdown-caret">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </span>
        </div>

        <!-- Category filter (150px) -->
        <div class="dropdown-container">
          <select class="dropdown-select" id="categoryFilter" style="width:150px" aria-label="Filter by category">
            <option value="all">All Categories</option>
          </select>
          <span class="dropdown-caret">

/* ── SVG Icon Helpers ───────────────────────────────────────────────── */
function starSvg(size) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="currentColor" style="display:inline-block;vertical-align:middle;flex-shrink:0"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
}
function chevronSvg(size) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:block"><polyline points="6 9 12 15 18 9"/></svg>`;
}

const CAT_ICONS = {
  lab: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H10l-.5 7L5 19a1.5 1.5 0 001.4 2h11.2A1.5 1.5 0 0019 19L15 9z"/><path d="M9.5 9h5"/></svg>`,
  reg: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="13" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>`,
  uni: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3.333 2 8.667 2 12 0v-5"/></svg>`,
  edu: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>`
};
const CAT_LABELS  = { lab: "Labs",      reg: "Workshops", uni: "University", edu: "EDU" };
const CAT_MULT    = { lab: 4,           reg: 6,           uni: 8,            edu: 3     };

/* ── Filter State ───────────────────────────────────────────────────── */
const state = { year: 'all', quarter: 'all', category: 'all', search: '' };

function isFiltered() {
  return state.year !== 'all' || state.quarter !== 'all' ||
         state.category !== 'all' || state.search !== '';
}

function applyFilters(data) {
  return data.filter(e => {
    if (state.year !== 'all' && String(e.year) !== state.year) return false;
    if (state.quarter !== 'all' && e.quarter !== state.quarter) return false;
    if (state.category !== 'all' && e.department !== state.category) return false;
    if (state.search && !e.name.toLowerCase().includes(state.search.toLowerCase())) return false;
    return true;
  });
}

/* ── Render Podium ──────────────────────────────────────────────────── */
function renderPodium(top3) {
  const podium = document.getElementById('podiumSection');

  if (top3.length === 0) {
    podium.classList.add('podium-hidden');
    return;
  }
  podium.classList.remove('podium-hidden');

  const rank1 = top3[0];
  const rank2 = top3[1] || null;
  const rank3 = top3[2] || null;

  function podiumColHtml(entry, rankLabel, colClass, avatarClass, badgeClass, pillClass, blockClass, rnClass, rnOffsetClass) {
    if (!entry) return `<div class="podium-col ${colClass}" style="visibility:hidden"></div>`;
    const initials = entry.avatarInitials;
    const color    = entry.avatarColor;
    return `
      <div class="podium-col ${colClass}">
        <div class="podium-user">
          <div class="podium-avatar-container">
            <div class="podium-avatar ${avatarClass}" style="background-color:${color}">${initials}</div>
            <div class="podium-rank-badge ${badgeClass}">${rankLabel}</div>
          </div>
          <h3 class="podium-name podium-name-${colClass === 'podium-col-rank1' ? 'r1' : (colClass === 'podium-col-rank2' ? 'r2' : 'r3')}">${entry.name}</h3>
          <p class="podium-role">${entry.department}</p>
          <div class="podium-score-pill ${pillClass}">
            ${starSvg(colClass === 'podium-col-rank1' ? 18 : 16)}
            <span>${entry.score}</span>
          </div>
        </div>
        <div class="podium-block ${blockClass}">
          <span class="podium-rank-number ${rnClass} ${rnOffsetClass}">${rankLabel}</span>
        </div>
      </div>`;
  }

  const r2html = podiumColHtml(rank2, '2',
    'podium-col-rank2',
    'podium-avatar-r2',
    'podium-badge-r2',
    'podium-score-pill-r2',
    'podium-block-r2',
    'podium-rank-number-r2', '');

  const r1html = podiumColHtml(rank1, '1',
    'podium-col-rank1',
    'podium-avatar-r1',
    'podium-badge-r1',
    'podium-score-pill-r1',
    'podium-block-r1',
    'podium-rank-number-r1', '');

  const r3html = podiumColHtml(rank3, '3',
    'podium-col-rank3',
    'podium-avatar-r3',
    'podium-badge-r3',
    'podium-score-pill-r3',
    'podium-block-r3',
    'podium-rank-number-r3', 'podium-rank-number-r3-offset');

  /* DOM order: rank2, rank1, rank3 */
  podium.innerHTML = r2html + r1html + r3html;
}

/* ── Render List Row ────────────────────────────────────────────────── */
function categoryStatsHtml(cats) {
  return Object.entries(cats).map(([key, count]) => `
    <div class="category-stat" title="${CAT_LABELS[key]}: ${count}">
      <span class="category-stat-icon">${CAT_ICONS[key]}</span>
      <span class="category-stat-count">${count}</span>
    </div>`).join('');
}

function expandedPanelHtml(cats) {
  const items = Object.entries(cats).map(([key, count]) => {
    const pts = count * CAT_MULT[key];
    return `
      <div class="expanded-stat-item">
        <div class="expanded-stat-icon-wrap">${CAT_ICONS[key]}</div>
        <div class="expanded-stat-info">
          <span class="expanded-stat-label">${CAT_LABELS[key]}</span>
          <span class="expanded-stat-value">${count} <span class="expanded-stat-pts">× ${CAT_MULT[key]} = ${pts} pts</span></span>
        </div>
      </div>`;
  }).join('');
  return `
    <div class="expanded-panel-inner">
      <div class="expanded-stats-title">Activity Breakdown</div>
      <div class="expanded-stats-grid">${items}</div>
    </div>`;
}

function renderListRow(entry, displayRank) {
  const catStats = categoryStatsHtml(entry.categories);
  const expandedPanel = expandedPanelHtml(entry.categories);
  return `
    <div class="user-row-container" data-id="${entry.id}">
      <div class="row-inner">
        <div class="row-main">
          <div class="row-left">
            <span class="rank-cell">${displayRank}</span>
            <div class="avatar" style="background-color:${entry.avatarColor}">${entry.avatarInitials}</div>
            <div class="info">
              <h3 class="name">${entry.name}</h3>
              <span class="role">${entry.department}</span>
            </div>
          </div>
          <div class="row-right">
            <div class="category-stats">${catStats}</div>
            <div class="total-section">
              <span class="total-label">TOTAL</span>
              <div class="score">
                ${starSvg(28)}
                <span>${entry.score}</span>
              </div>
            </div>
            <button class="expand-btn" aria-label="Expand" aria-expanded="false">
              ${chevronSvg(20)}
            </button>
          </div>
        </div>
      </div>
      <div class="expanded-panel">
        ${expandedPanel}
      </div>
    </div>`;
}

/* ── Render All ─────────────────────────────────────────────────────── */
function renderAll() {
  const filtered = applyFilters(LEADERBOARD_DATA);
  const listEl   = document.getElementById('listSection');
  const podiumEl = document.getElementById('podiumSection');
  const filtersOn = isFiltered();

  if (filtersOn) {
    /* Hide podium, show all matching entries in list with sequential ranks */
    podiumEl.classList.add('podium-hidden');
    if (filtered.length === 0) {
      listEl.innerHTML = '<p class="no-results">No employees match the current filters.</p>';
    } else {
      listEl.innerHTML = filtered.map((e, i) => renderListRow(e, i + 1)).join('');
    }
  } else {
    /* Show top-3 in podium, rest in list */
    renderPodium(LEADERBOARD_DATA.slice(0, 3));
    const listEntries = LEADERBOARD_DATA.slice(3);
    listEl.innerHTML = listEntries.map(e => renderListRow(e, e.rank)).join('');
  }

  /* Re-attach expand listeners */
  attachExpandListeners();
}

/* ── Expand / Collapse ──────────────────────────────────────────────── */
function attachExpandListeners() {
  document.querySelectorAll('.expand-btn').forEach(btn => {
    btn.addEventListener('click', function () {
      const container = this.closest('.user-row-container');
      const isExpanded = container.classList.toggle('expanded');
      this.setAttribute('aria-expanded', String(isExpanded));
      this.setAttribute('aria-label', isExpanded ? 'Collapse' : 'Expand');
    });
  });
}

/* ── Populate Dropdowns ─────────────────────────────────────────────── */
function populateDropdowns() {
  const years      = [...new Set(LEADERBOARD_DATA.map(e => e.year))].sort((a, b) => b - a);
  const categories = [...new Set(LEADERBOARD_DATA.map(e => e.department))].sort();

  const yearSel = document.getElementById('yearFilter');
  years.forEach(y => {
    const opt = document.createElement('option');
    opt.value = String(y);
    opt.textContent = String(y);
    yearSel.appendChild(opt);
  });

  const catSel = document.getElementById('categoryFilter');
  categories.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    catSel.appendChild(opt);
  });
}

/* ── Event Listeners ────────────────────────────────────────────────── */
document.getElementById('yearFilter').addEventListener('change', function () {
  state.year = this.value;
  renderAll();
});
document.getElementById('quarterFilter').addEventListener('change', function () {
  state.quarter = this.value;
  renderAll();
});
document.getElementById('categoryFilter').addEventListener('change', function () {
  state.category = this.value;
  renderAll();
});
document.getElementById('searchInput').addEventListener('input', function () {
  state.search = this.value.trim();
  renderAll();
});

/* ── Init ───────────────────────────────────────────────────────────── */
populateDropdowns();
renderAll();
</script>
